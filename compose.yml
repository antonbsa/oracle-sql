services:
  oracle:
    image: gvenzl/oracle-xe:21-slim
    container_name: oracle-xe-21c
    restart: unless-stopped
    ports:
      - "${ORACLE_PORT:-1521}:1521"
    environment:
      ORACLE_PASSWORD: ${ORACLE_PASSWORD}
      ORACLE_DATABASE: ${ORACLE_DATABASE:-}
      APP_USER: ${APP_USER:-app_user}
      APP_USER_PASSWORD: ${APP_USER_PASSWORD}
    volumes:
      - oracle-data:/opt/oracle/oradata
    healthcheck:
      test: ["CMD", "healthcheck.sh"]
      interval: 30s
      timeout: 10s
      retries: 20
      start_period: 180s

  flyway:
    image: flyway/flyway:10-alpine
    command: migrate
    depends_on:
      oracle:
        condition: service_healthy
    environment:
      FLYWAY_URL: jdbc:oracle:thin:@oracle:1521/${ORACLE_DATABASE:-XEPDB1}
      FLYWAY_USER: SYSTEM
      FLYWAY_PASSWORD: ${ORACLE_PASSWORD}
      FLYWAY_SCHEMAS: ${APP_USER:-app_user}
      FLYWAY_CONNECT_RETRIES: 10
      FLYWAY_LOCATIONS: filesystem:/flyway/db/migration
    volumes:
      - ./infra/migrations:/flyway/db/migration
    profiles:
      - migrate

volumes:
  oracle-data:
